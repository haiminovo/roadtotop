name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PORT }}" -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p "${{ secrets.PORT }}" "${{ secrets.USERNAME }}@${{ secrets.HOST }}" << 'EOF'
            set -e
            [ -f /etc/profile ] && source /etc/profile || true
            [ -f ~/.bash_profile ] && source ~/.bash_profile || true
            [ -f ~/.bashrc ] && source ~/.bashrc || true

            # BaoTa often installs Node under /www/server/nodejs/*/bin, which may not
            # be available in non-interactive SSH sessions.
            if ! command -v node >/dev/null 2>&1; then
              BT_NODE_BIN="$(ls -d /www/server/nodejs/*/bin 2>/dev/null | head -n 1 || true)"
              if [ -n "${BT_NODE_BIN}" ]; then
                export PATH="${BT_NODE_BIN}:${PATH}"
              fi
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "node not found. Please install Node.js in BaoTa (recommended v20 LTS)."
              exit 1
            fi

            cd "${{ secrets.PROJECT_PATH }}"
            git pull origin main

            if command -v corepack >/dev/null 2>&1; then
              corepack enable
            fi

            if ! command -v pnpm >/dev/null 2>&1; then
              if command -v npm >/dev/null 2>&1; then
                npm install -g pnpm
              else
                echo "pnpm and npm are both not found. Please install Node.js/npm on server first."
                exit 1
              fi
            fi

            node -v
            npm -v
            pnpm -v
            pm2 -v

            pnpm install --frozen-lockfile
            pnpm build
            pnpm db:init
            pm2 restart roadtotop-web || pm2 start "pnpm start:web" --name roadtotop-web
            pm2 restart roadtotop-ws || pm2 start "pnpm start:ws" --name roadtotop-ws
            pm2 save
          EOF
